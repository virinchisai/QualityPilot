name: ZAP baseline (manual)
on:
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d demo-app
      - run: for i in {1..30}; do curl -fsS http://localhost:8000/health && exit 0; sleep 2; done; exit 1
      - uses: zaproxy/action-baseline@v0.15.0
        with: { target: "http://localhost:8000", fail_action: true, artifact_name: zap-report }

