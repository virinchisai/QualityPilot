name: Defect report
description: Report reproducible QualityPilot behavior (use a private advisory for security issues).
body:
  - type: textarea
    id: summary
    attributes: { label: Summary }
    validations: { required: true }
  - type: textarea
    id: steps
    attributes: { label: Steps to reproduce }
    validations: { required: true }
  - type: textarea
    id: evidence
    attributes: { label: Sanitized evidence }
  - type: input
    id: commit
    attributes: { label: Commit SHA }

