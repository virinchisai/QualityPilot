version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule: { interval: weekly }
    groups:
      python-minor: { update-types: [minor, patch] }
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    groups:
      node-minor: { update-types: [minor, patch] }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }

