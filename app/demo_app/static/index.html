<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width">
<title>QualityPilot Demo Login</title><link rel="stylesheet" href="/static/styles.css"></head>
<body><main><h1>Demo enterprise login</h1><p class="muted">A safe system under test for QualityPilot.</p>
<form id="login-form"><label>Email<input id="email" name="email" type="email" required autocomplete="username"></label>
<label>Password<input id="password" name="password" type="password" required autocomplete="current-password"></label>
<p id="error" class="error" role="alert"></p><button id="login-button" type="submit">Sign in</button></form></main>
<script>
document.querySelector('#login-form').addEventListener('submit', async (event) => {
 event.preventDefault(); const error = document.querySelector('#error'); error.textContent='';
 const response = await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})});
 if(!response.ok){error.textContent='Invalid email or password';return;} const tokens=await response.json();
 sessionStorage.setItem('access_token',tokens.access_token); sessionStorage.setItem('refresh_token',tokens.refresh_token); location.href='/dashboard';
});
</script></body></html>
