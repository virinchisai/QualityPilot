services:
  demo-app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////data/qualitypilot.db
    ports: ["8000:8000"]
    volumes: ["qualitypilot-data:/data"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
  quality-api:
    build: .
    command: ["uvicorn", "app.backend.main:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////data/qualitypilot.db
    ports: ["8001:8001"]
    volumes: ["qualitypilot-data:/data", "qualitypilot-reports:/app/reports/generated"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
  dashboard:
    build:
      context: .
      dockerfile: docker/Dashboard.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      QUALITYPILOT_API_URL: http://quality-api:8001
    ports: ["8501:8501"]
    depends_on:
      quality-api:
        condition: service_healthy
volumes:
  qualitypilot-data:
  qualitypilot-reports:
